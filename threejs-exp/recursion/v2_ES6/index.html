<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Recursive Harmony 3D</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
	<style>
		:root {
			--glass-bg: rgba(15, 15, 20, 0.4);
			--glass-border: rgba(255, 255, 255, 0.1);
			--accent-blue: #007AFF;
			--accent-glow: rgba(0, 122, 255, 0.5);
			--text-main: #FFFFFF;
		}

		body, html {
			margin: 0;
			padding: 0;
			width: 100%;
			height: 100%;
			overflow: hidden;
			background: radial-gradient(circle at center, #0a1122 0%, #000 100%);
			font-family: 'Outfit', sans-serif;
			color: var(--text-main);
		}

		canvas {
			display: block;
			width: 100%;
			height: 100%;
		}

		/* Premium HUD */
		#premium-hud {
			position: fixed;
			top: 24px;
			left: 50%;
			transform: translateX(-50%);
			display: flex;
			align-items: center;
			gap: 16px;
			padding: 10px 20px;
			background: var(--glass-bg);
			backdrop-filter: blur(24px) saturate(160%);
			-webkit-backdrop-filter: blur(24px) saturate(160%);
			border: 1px solid var(--glass-border);
			border-radius: 40px;
			box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
			z-index: 1000;
			transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
			animation: pulse-border 4s infinite ease-in-out;
		}

		@keyframes pulse-border {
			0%, 100% { border-color: rgba(255, 255, 255, 0.1); }
			50% { border-color: rgba(255, 255, 255, 0.25); }
		}

		#premium-hud:hover {
			border-color: rgba(255, 255, 255, 0.2);
			transform: translateX(-50%) translateY(-2px);
		}

		.hud-group {
			display: flex;
			align-items: center;
			gap: 8px;
		}

		.hud-btn {
			background: transparent;
			border: none;
			color: rgba(255, 255, 255, 0.7);
			cursor: pointer;
			display: flex;
			align-items: center;
			justify-content: center;
			padding: 8px;
			border-radius: 50%;
			transition: all 0.3s ease;
		}

		.hud-btn:hover {
			background: rgba(255, 255, 255, 0.1);
			color: var(--text-main);
		}

		.hud-btn.active {
			color: var(--accent-blue);
			text-shadow: 0 0 10px var(--accent-glow);
		}

		.hud-btn svg {
			width: 20px;
			height: 20px;
			fill: currentColor;
		}

		.hud-divider {
			width: 1px;
			height: 20px;
			background: var(--glass-border);
		}

		.hud-label {
			font-size: 13px;
			font-weight: 500;
			letter-spacing: 0.5px;
			opacity: 0.8;
			margin-left: 4px;
		}

		/* Tooltip */
		[data-tooltip]::after {
			content: attr(data-tooltip);
			position: absolute;
			bottom: -40px;
			left: 50%;
			transform: translateX(-50%);
			background: rgba(0, 0, 0, 0.8);
			padding: 4px 10px;
			border-radius: 6px;
			font-size: 11px;
			white-space: nowrap;
			opacity: 0;
			pointer-events: none;
			transition: opacity 0.2s ease;
		}

		[data-tooltip]:hover::after {
			opacity: 1;
		}

		/* Hidden GUI */
		.dg.main {
			display: none !important;
		}
	</style>
</head>
<body>
	<div id="premium-hud">
		<div class="hud-group">
			<button id="btn-play" class="hud-btn active" data-tooltip="Play / Pause (Space)">
				<svg id="icon-play" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
			</button>
			<button id="btn-reset" class="hud-btn" data-tooltip="Refresh Scene">
				<svg viewBox="0 0 24 24"><path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
			</button>
		</div>
		<div class="hud-divider"></div>
		<div class="hud-group">
			<button id="btn-turntable" class="hud-btn" data-tooltip="Turntable Mode">
				<svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm0-12.5c-2.48 0-4.5 2.02-4.5 4.5s2.02 4.5 4.5 4.5 4.5-2.02 4.5-4.5-2.02-4.5-4.5-4.5zM12 15c-1.66 0-3-1.34-3-3s1.34-3 3-3 3 1.34 3 3-1.34 3-3 3z"/></svg>
				<span class="hud-label">AUTO</span>
			</button>
		</div>
		<div class="hud-divider"></div>
		<div class="hud-group">
			<button id="btn-fullscreen" class="hud-btn" data-tooltip="Fullscreen">
				<svg viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
			</button>
		</div>
	</div>

	<script src="../../z_libs/three.min.js"></script>
	<script src="../../z_libs/TrackballControls.js"></script>
	<script src="../../z_libs/dat.gui.min.js"></script>
	<script src="main.js"></script>
</body>
</html>
