<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Getting Started with Three.js</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&display=swap" rel="stylesheet">
    <style>
      :root {
        --glass-bg: rgba(25, 25, 25, 0.45);
        --glass-border: rgba(255, 255, 255, 0.1);
        --accent-color: #0072ff;
        --text-color: #ffffff;
      }
      body {
        margin: 0;
        background-color: #000;
        font-family: 'Outfit', sans-serif;
        overflow: hidden;
      }
      #ui-root {
        position: fixed;
        left: 20px;
        top: 50%;
        transform: translateY(-50%);
        z-index: 100;
        display: flex;
        flex-direction: column;
        gap: 15px;
      }
      .side-box {
        background: var(--glass-bg);
        backdrop-filter: blur(25px) saturate(180%);
        -webkit-backdrop-filter: blur(25px) saturate(180%);
        border: 1px solid var(--glass-border);
        border-radius: 28px;
        padding: 24px;
        width: 220px;
        max-height: 80vh;
        box-shadow: 0 12px 40px rgba(0,0,0,0.5);
        display: flex;
        flex-direction: column;
      }
      .box-header {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 20px;
        flex-shrink: 0;
      }
      .box-header h2 {
        margin: 0;
        font-size: 11px;
        font-weight: 900;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        color: rgba(255,255,255,0.4);
      }
      .geometry-list {
        display: flex;
        flex-direction: column;
        gap: 8px;
        overflow-y: auto;
        padding-right: 14px;
        margin-right: -14px;
      }
      /* Custom Scrollbar */
      .geometry-list::-webkit-scrollbar {
        width: 4px;
      }
      .geometry-list::-webkit-scrollbar-track {
        background: transparent;
      }
      .geometry-list::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.1);
        border-radius: 10px;
      }
      .geometry-list::-webkit-scrollbar-thumb:hover {
        background: rgba(255, 255, 255, 0.2);
      }

      .category-header {
        font-size: 9px;
        font-weight: 900;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: rgba(255,255,255,0.25);
        margin: 15px 0 8px 5px;
      }
      .category-header:first-child {
        margin-top: 0;
      }

      .geo-btn {
        background: rgba(255,255,255,0.03);
        border: 1px solid rgba(255,255,255,0.05);
        border-radius: 14px;
        padding: 10px 16px;
        color: rgba(255,255,255,0.7);
        font-size: 13px;
        font-weight: 500;
        text-align: left;
        cursor: pointer;
        transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        display: flex;
        justify-content: space-between;
        align-items: center;
        outline: none;
        flex-shrink: 0;
      }
      .geo-btn:hover {
        background: rgba(255,255,255,0.08);
        color: #fff;
        transform: translateX(5px);
        border-color: rgba(255,255,255,0.15);
      }
      .geo-btn.active {
        background: var(--accent-color);
        color: #fff;
        box-shadow: 0 0 20px rgba(0, 114, 255, 0.4);
        border-color: rgba(255,255,255,0.2);
      }
      .geo-btn .indicator {
        font-size: 10px;
        opacity: 0.3;
      }
      .geo-btn.active .indicator {
        opacity: 1;
        font-weight: 900;
      }
    </style>
    <script type="importmap">
			{
				"imports": {
					"three": "https://cdn.jsdelivr.net/npm/three@0.161.0/build/three.module.js",
          "jsm/": "https://cdn.jsdelivr.net/npm/three@0.161.0/examples/jsm/"
        }
			}
		</script>
  </head>
  <body>
    <div id="ui-root">
      <div class="side-box">
        <div class="box-header">
          <h2>Standard Assets</h2>
        </div>
        <div class="geometry-list">
          <div class="category-header">Basic Solids</div>
          <button class="geo-btn active" data-type="box">
            <span>Box</span>
            <span class="indicator">■</span>
          </button>
          <button class="geo-btn" data-type="sphere">
            <span>Sphere</span>
            <span class="indicator">●</span>
          </button>
          <button class="geo-btn" data-type="capsule">
            <span>Capsule</span>
            <span class="indicator">◒</span>
          </button>
          <button class="geo-btn" data-type="cylinder">
            <span>Cylinder</span>
            <span class="indicator">▮</span>
          </button>
          <button class="geo-btn" data-type="cone">
            <span>Cone</span>
            <span class="indicator">▲</span>
          </button>

          <div class="category-header">Polyhedrons</div>
          <button class="geo-btn" data-type="icosahedron">
            <span>Icosahedron</span>
            <span class="indicator">◈</span>
          </button>
          <button class="geo-btn" data-type="dodecahedron">
            <span>Dodecahedron</span>
            <span class="indicator">⬢</span>
          </button>
          <button class="geo-btn" data-type="octahedron">
            <span>Octahedron</span>
            <span class="indicator">◆</span>
          </button>
          <button class="geo-btn" data-type="tetrahedron">
            <span>Tetrahedron</span>
            <span class="indicator">▼</span>
          </button>

          <div class="category-header">Surfaces & Special</div>
          <button class="geo-btn" data-type="torus">
            <span>Torus</span>
            <span class="indicator">◎</span>
          </button>
          <button class="geo-btn" data-type="knot">
            <span>Torus Knot</span>
            <span class="indicator">∞</span>
          </button>
          <button class="geo-btn" data-type="plane">
            <span>Plane</span>
            <span class="indicator">📄</span>
          </button>
          <button class="geo-btn" data-type="circle">
            <span>Circle</span>
            <span class="indicator">○</span>
          </button>
          <button class="geo-btn" data-type="ring">
            <span>Ring</span>
            <span class="indicator">◌</span>
          </button>
        </div>
      </div>
    </div>
    <script type="module" src="index.js"></script>
  </body>
</html>
