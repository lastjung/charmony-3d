<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wormhole Explorer Pro HUD - Apple UI Edition</title>
    <style>
      body {
        margin: 0;
        overflow: hidden;
        background: #000;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      }
      
      /* Premium Apple Design Language */
      :root {
        --apple-glass-bg: rgba(10, 10, 20, 0.75);
        --apple-glass-blur: blur(48px) saturate(200%);
        --apple-glass-border: 1px solid rgba(255, 255, 255, 0.2);
        --apple-accent-red: #ff453a;
        --ui-text-bright: #ffffff;
        --ui-text-muted: rgba(255, 255, 255, 0.5);
        
        /* Official Game Color Scheme Map */
        --theme-1-rainbow: #ff3b30;
        --theme-2-cosmic: #64d2ff;
        --theme-3-twilight: #ffd60a;
        --theme-4-aurora: #bf5af2;
        --theme-5-cyan: #007aff;
        --theme-6-sunset: #ff9500;
        --theme-7-lime: #32d74b;
      }

      /* Game Side Box - Ultra Slim Premium Sidebar */
      .controls-sidebar {
        position: fixed;
        top: 25px;
        right: 25px;
        width: 200px;
        background: var(--apple-glass-bg);
        backdrop-filter: var(--apple-glass-blur);
        -webkit-backdrop-filter: var(--apple-glass-blur);
        border: var(--apple-glass-border);
        border-radius: 36px;
        padding: 24px;
        color: white;
        box-shadow: 0 40px 120px rgba(0, 0, 0, 0.8);
        user-select: none;
        z-index: 1000;
        transition: 0.25s ease;
      }
      .controls-sidebar.hidden {
        opacity: 0;
        transform: translateX(20px);
        pointer-events: none;
      }

      .sidebar-grip {
        width: 40px;
        height: 4px;
        background: rgba(255, 255, 255, 0.15);
        border-radius: 10px;
        margin: -8px auto 22px;
        cursor: grab;
      }

      .sidebar-header {
        font-size: 8px;
        font-weight: 800;
        letter-spacing: 0.28em;
        text-align: center;
        color: var(--ui-text-muted);
        margin-bottom: 32px;
        text-transform: uppercase;
      }

      /* Premium Slider & Row (Refined) */
      .setting-row { margin-bottom: 24px; position: relative; }
      .setting-header { 
        display: flex; 
        align-items: center; 
        font-size: 10.5px; 
        margin-bottom: 15px; 
        color: var(--row-color); 
        cursor: pointer; 
        font-weight: 800;
      }
      
      .auto-indicator { 
        font-size: 8px; 
        width: 14px; 
        height: 14px; 
        background: rgba(255,255,255,0.08); 
        border-radius: 50%; 
        display: flex; 
        align-items: center; 
        justify-content: center; 
        margin-right: 15px; 
      }
      
      .setting-label { flex-grow: 1; letter-spacing: 0.08em; }
      .slider-value { 
        font-weight: 900; 
        font-variant-numeric: tabular-nums; 
        color: var(--ui-text-bright); 
        font-size: 10px; 
        background: rgba(255,255,255,0.05); 
        padding: 2px 10px; 
        border-radius: 20px; 
      }

      .apple-slider { 
        -webkit-appearance: none; 
        appearance: none; 
        width: 100%; 
        height: 3px; 
        background: rgba(255, 255, 255, 0.08); 
        border-radius: 10px; 
        outline: none; 
      }
      
      .apple-slider::-webkit-slider-thumb { 
        -webkit-appearance: none; 
        appearance: none; 
        width: 13px; 
        height: 13px; 
        background: #ffffff; 
        border: 4px solid var(--row-color); 
        border-radius: 50%; 
        cursor: pointer; 
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.4); 
        transition: 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      }
      .apple-slider::-webkit-slider-thumb:hover { width: 16px; height: 16px; transform: scale(1.1); }

      .setting-row.auto-active { --row-color: var(--apple-accent-red) !important; }
      .setting-row.auto-active .auto-indicator { background: var(--apple-accent-red); color: white; }
      .setting-row.auto-active .setting-header { animation: system-override 2s infinite ease-in-out; }
      
      /* Game Play Box - Refined Symmetry & Ultra Slim */
      .apple-player {
        position: fixed;
        bottom: 30px;
        left: 50%;
        transform: translateX(-50%);
        width: 90%;
        max-width: 600px;
        height: 44px; /* Ultra-Slimmed */
        background: var(--apple-glass-bg);
        backdrop-filter: var(--apple-glass-blur);
        -webkit-backdrop-filter: var(--apple-glass-blur);
        border: var(--apple-glass-border);
        border-radius: 22px;
        display: flex;
        align-items: center;
        padding: 0 24px;
        color: white;
        box-shadow: 0 20px 80px rgba(0, 0, 0, 0.8);
        z-index: 1000;
        transition: 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      }
      .apple-player.hidden {
        opacity: 0;
        transform: translateX(-50%) translateY(20px);
        pointer-events: none;
      }

      .player-row { display: flex; align-items: center; width: 100%; justify-content: space-between; }
      
      .volume-group { display: flex; align-items: center; gap: 12px; width: 140px; }
      .volume-btn { 
        background: none; border: none; font-size: 16px; color: #64d2ff; cursor: pointer; padding: 4px; border-radius: 50%; transition: 0.3s; opacity: 0.8;
      }
      .volume-btn:hover { opacity: 1; transform: scale(1.1); background: rgba(255,255,255,0.1); }
      .volume-btn.muted { color: var(--apple-accent-red); }

      .playback-group { display: flex; align-items: center; gap: 20px; position: absolute; left: 50%; transform: translateX(-50%); }
      .extra-group { display: flex; align-items: center; gap: 12px; width: 140px; justify-content: flex-end; }

      .player-btn-mini { 
        background: none; border: none; color: white; cursor: pointer; width: 32px; height: 32px; border-radius: 50%; opacity: 0.6; transition: 0.25s; font-size: 15px; font-weight: 800; display: flex; align-items: center; justify-content: center; 
      }
      .player-btn-mini:hover { opacity: 1; transform: scale(1.15); background: rgba(255,255,255,0.1); }
      
      .player-btn-main { 
        background: white; border: none; color: black; cursor: pointer; width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: 0.3s; font-size: 14px; 
      }
      .player-btn-main.playing { border: 2px solid #007aff; box-shadow: 0 0 20px rgba(0,122,255,0.6); }
      
      .timeline-slider { flex: 1; -webkit-appearance: none; appearance: none; height: 3px; background: rgba(255,255,255,0.18); border-radius: 10px; min-width: 60px; }
      .timeline-slider::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 10px; height: 10px; background: white; border-radius: 50%; border: 2px solid #007aff; }

      /* Mobile Responsiveness */
      @media screen and (max-width: 768px) {
        .controls-sidebar { display: none; } /* Hide sidebar on mobile */
        .apple-player { width: 95%; height: 48px; bottom: 20px; padding: 0 16px; }
        .volume-group, .extra-group { width: auto; }
        .volume-group input { display: none; } /* Hide volume slider on mobile */
      }
    </style>
    <script type="importmap">
      {
				"imports": {
					"three": "https://cdn.jsdelivr.net/npm/three@0.161/build/three.module.js",
          "jsm/": "https://cdn.jsdelivr.net/npm/three@0.161/examples/jsm/"
        }
			}
    </script>
  </head>
  <body>
    <!-- Game Side Box - Ultra Slim -->
    <div class="controls-sidebar" id="sidebar">
      <div class="sidebar-grip" id="sidebar-grip"></div>
      <div class="sidebar-header">WORMHOLE EXPLORER</div>

      <div class="setting-row" id="row-1" style="--row-color: var(--theme-1-rainbow);">
        <div class="setting-header">
          <span class="auto-indicator" id="ind-1">1</span>
          <label class="setting-label">FLY POSITION</label>
          <span class="slider-value" id="val-1">0.00</span>
        </div>
        <input type="range" class="apple-slider" id="input-1" min="0" max="1" step="0.001" value="0">
      </div>

      <div class="setting-row" id="row-2" style="--row-color: var(--theme-2-cosmic);">
        <div class="setting-header">
          <span class="auto-indicator" id="ind-2">2</span>
          <label class="setting-label">FLY SPEED</label>
          <span class="slider-value" id="val-2">1.00</span>
        </div>
        <input type="range" class="apple-slider" id="input-2" min="0.1" max="5" step="0.1" value="1.0">
      </div>

      <div class="setting-row" id="row-3" style="--row-color: var(--theme-3-twilight);">
        <div class="setting-header">
          <span class="auto-indicator" id="ind-3">3</span>
          <label class="setting-label">TUBE RADIUS</label>
          <span class="slider-value" id="val-3">0.65</span>
        </div>
        <input type="range" class="apple-slider" id="input-3" min="0.1" max="2.0" step="0.01" value="0.65">
      </div>

      <div class="setting-row" id="row-4" style="--row-color: var(--theme-4-aurora);">
        <div class="setting-header">
          <span class="auto-indicator" id="ind-4">4</span>
          <label class="setting-label">FIELD OF VIEW</label>
          <span class="slider-value" id="val-4">75.0</span>
        </div>
        <input type="range" class="apple-slider" id="input-4" min="30" max="140" step="1" value="75">
      </div>

      <div class="setting-row" id="row-5" style="--row-color: var(--theme-5-cyan);">
        <div class="setting-header">
          <span class="auto-indicator" id="ind-5">5</span>
          <label class="setting-label">HUE THEME</label>
          <span class="slider-value" id="val-5">0.70</span>
        </div>
        <input type="range" class="apple-slider" id="input-5" min="0" max="0.9" step="0.01" value="0.7">
      </div>

      <div class="setting-row" id="row-6" style="--row-color: var(--theme-6-sunset);">
        <div class="setting-header">
          <span class="auto-indicator" id="ind-6">6</span>
          <label class="setting-label">BLOOM POWER</label>
          <span class="slider-value" id="val-6">3.50</span>
        </div>
        <input type="range" class="apple-slider" id="input-6" min="0" max="10" step="0.1" value="3.5">
      </div>

      <div class="setting-row" id="row-7" style="--row-color: var(--theme-7-lime);">
        <div class="setting-header">
          <span class="auto-indicator" id="ind-7">7</span>
          <label class="setting-label">FOG DENSITY</label>
          <span class="slider-value" id="val-7">0.30</span>
        </div>
        <input type="range" class="apple-slider" id="input-7" min="1" max="500" step="1" value="300">
      </div>
    </div>

    <!-- Game Play Box -->
    <div class="apple-player" id="apple-player">
      <div class="player-row">
        <!-- 좌측: 볼륨 그룹 (140px) -->
        <div class="volume-group">
          <button class="volume-btn" id="volume-toggle">🔊</button>
          <input type="range" class="timeline-slider" id="volume-slider" min="0" max="1" step="0.01" value="0" style="width: 80px;">
        </div>

        <!-- 중앙: 컨트롤 (Symmetry) -->
        <div class="playback-group">
          <button class="player-btn-mini" id="player-partial-reset">↩</button>
          <button class="player-btn-mini" id="player-speed-down">«</button>
          <button class="player-btn-main" id="player-play">▶</button>
          <button class="player-btn-mini" id="player-speed-up">»</button>
          <button class="player-btn-mini" id="player-full-reset">🔄</button>
        </div>

        <!-- 우측: 액션 그룹 (140px) -->
        <div class="extra-group">
          <button class="player-btn-mini" id="player-fullscreen">⛶</button>
          <button class="player-btn-mini" id="player-show-all" title="Show All UI (Esc)">▣</button>
        </div>
      </div>
    </div>

    <script type="module" src="index.js"></script>
  </body>
</html>
